# CI workflow — builds, tests, and gates merges to main
name: CI

on:
  push:
    branches: [main, dev, test, 'hotfix/**']
    paths-ignore:
      - '.github/workflows/ai-triage.yml'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/cleanup-dev-versions.yml'
      - 'LICENSE'
  pull_request:
    branches: [main, dev, test]
    paths-ignore:
      - '.github/workflows/ai-triage.yml'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/cleanup-dev-versions.yml'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      run_coverage:
        description: Run coverage thresholds (default on main push only)
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single checkout + classify + fast scans (~2–5 min). Replaces detect-changes,
  # docs-check, and lint jobs so build can start as soon as this finishes.
  fast-gates:
    name: fast-gates
    timeout-minutes: 15
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      heavy-code-changed: ${{ steps.classify.outputs.heavy-code-changed }}
      web-changed: ${{ steps.classify.outputs.web-changed }}
      portability-changed: ${{ steps.classify.outputs.portability-changed }}
      windows-e2e-changed: ${{ steps.classify.outputs.windows-e2e-changed }}
      docker-changed: ${{ steps.classify.outputs.docker-changed }}
    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '0'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*' \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Prepare diff base for scans
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/ci-fetch-diff-base.sh

      - name: Classify changed files
        id: classify
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: bash scripts/ci-classify-changes.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run fast gates
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/ci-fast-gates.sh

  build:
    name: build
    timeout-minutes: 45
    needs: [fast-gates]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm run build:core

      - uses: ./.github/actions/cache-nextjs

      # validate-pack requires dist/web/standalone/server.js in the tarball (package.json files).
      - name: Build web host
        run: pnpm run build:web-host

      - name: Pack build artifacts
        run: bash scripts/ci-pack-build-artifacts.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ci-build-artifacts
          path: ci-build-artifacts.tar.gz
          retention-days: 1

      - name: Typecheck extensions
        run: pnpm run typecheck:extensions

      - name: Validate package is installable
        run: pnpm run validate-pack

      - name: Verify workspace coverage (every linkable package has tests)
        run: pnpm run verify:workspace-coverage

  test-unit:
    name: test-unit
    timeout-minutes: 20
    needs: [fast-gates, build]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Run unit tests
        run: |
          pnpm run test:compile
          pnpm run test:unit:compiled

  test-packages:
    name: test-packages
    timeout-minutes: 25
    needs: [fast-gates, build]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Run package tests
        run: pnpm run test:packages

  test-coverage:
    name: test-coverage
    timeout-minutes: 45
    needs: [fast-gates, build]
    if: >-
      needs.fast-gates.outputs.heavy-code-changed == 'true' &&
      (
        (github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/test')) ||
        (github.event_name == 'workflow_dispatch' && inputs.run_coverage)
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Check test coverage thresholds
        run: pnpm run test:coverage

  coverage-report:
    name: coverage-report
    timeout-minutes: 90
    continue-on-error: true
    needs: [fast-gates, build]
    if: >-
      github.event_name == 'pull_request' &&
      needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '0'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*' \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Generate merged coverage report (report-only)
        run: pnpm run test:coverage:full

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/file-index.json
          if-no-files-found: error
          retention-days: 14

  integration-tests:
    name: integration-tests
    timeout-minutes: 40
    needs: [fast-gates, build]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - uses: ./.github/actions/cache-nextjs

      - name: Run integration tests
        run: pnpm run test:integration

  e2e:
    name: e2e
    timeout-minutes: 15
    needs: [fast-gates, build]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Run e2e suite (against built binary)
        run: |
          chmod +x dist/loader.js
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          pnpm run test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-artifacts
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7

  docker-e2e:
    name: docker-e2e
    timeout-minutes: 30
    needs: [fast-gates, build]
    if: >-
      needs.fast-gates.outputs.heavy-code-changed == 'true' &&
      needs.fast-gates.outputs.docker-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Run docker e2e suite
        run: pnpm run test:e2e:docker

  windows-portability:
    name: windows-portability
    timeout-minutes: 25
    needs: [fast-gates, build]
    if: >-
      needs.fast-gates.outputs.heavy-code-changed == 'true' &&
      (needs.fast-gates.outputs.portability-changed == 'true' ||
       needs.fast-gates.outputs.windows-e2e-changed == 'true')
    runs-on: blacksmith-4vcpu-windows-2025

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Typecheck extensions
        if: needs.fast-gates.outputs.portability-changed == 'true'
        run: pnpm run typecheck:extensions

      - name: Run package tests
        if: needs.fast-gates.outputs.portability-changed == 'true'
        run: pnpm run test:packages

      - name: Run Windows portability tests
        if: needs.fast-gates.outputs.portability-changed == 'true'
        run: >-
          node --import ./src/resources/extensions/gsd/tests/resolve-ts.mjs
          --experimental-strip-types --test
          src/tests/windows-portability.test.ts
          src/resources/extensions/gsd/tests/validate-directory.test.ts
          src/tests/integration/web-mode-windows-hide.test.ts

      - name: Run Windows e2e smoke suite (non-blocking)
        id: windows-smoke-e2e
        if: needs.fast-gates.outputs.windows-e2e-changed == 'true'
        timeout-minutes: 10
        shell: bash
        continue-on-error: true
        run: |
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          pnpm run test:e2e:windows-smoke

      - name: Upload Windows e2e artifacts on failure
        if: steps.windows-smoke-e2e.outcome == 'failure'
        uses: actions/upload-artifact@v5
        with:
          name: e2e-artifacts-windows
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7
