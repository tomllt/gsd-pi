# CI workflow — builds, tests, and gates merges to main
name: CI

on:
  push:
    branches: [main, dev, test, 'hotfix/**']
    paths-ignore:
      - '.github/workflows/ai-triage.yml'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/cleanup-dev-versions.yml'
      - 'LICENSE'
  pull_request:
    branches: [main, dev, test]
    paths-ignore:
      - '.github/workflows/ai-triage.yml'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/cleanup-dev-versions.yml'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  # Group per-PR (pull_request.number is globally unique — head_ref is only the
  # source branch name, which collides across forks/PRs that share it) so pushing
  # to a PR cancels its own stale run, and fall back to the unique run_id on
  # branch pushes so an in-flight main/dev CI is never cancelled by a later push.
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Single checkout + classify + fast scans (~2–5 min). Replaces detect-changes,
  # docs-check, and lint jobs so build can start as soon as this finishes.
  fast-gates:
    name: fast-gates
    timeout-minutes: 15
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      heavy-code-changed: ${{ steps.classify.outputs.heavy-code-changed }}
      web-changed: ${{ steps.classify.outputs.web-changed }}
      portability-changed: ${{ steps.classify.outputs.portability-changed }}
      windows-e2e-changed: ${{ steps.classify.outputs.windows-e2e-changed }}
      docker-changed: ${{ steps.classify.outputs.docker-changed }}
    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '0'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*' \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Prepare diff base for scans
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/ci-fetch-diff-base.sh

      - name: Classify changed files
        id: classify
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: bash scripts/ci-classify-changes.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run fast gates
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/ci-fast-gates.sh

  build:
    name: build
    timeout-minutes: 45
    needs: [fast-gates]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: ./.github/actions/setup-linux-native-build-deps

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
          GSD_SKIP_DEP_REPAIR: '1'
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm run build:core

      - uses: ./.github/actions/cache-nextjs

      # validate-pack requires dist/web/standalone/server.js in the tarball (package.json files).
      - name: Build web host
        run: pnpm run build:web-host

      - name: Pack build artifacts
        run: bash scripts/ci-pack-build-artifacts.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ci-build-artifacts
          path: ci-build-artifacts.tar.gz
          retention-days: 1

      - name: Typecheck extensions
        run: pnpm run typecheck:extensions

      - name: Validate package is installable
        run: pnpm run validate-pack

      - name: Verify workspace coverage (every linkable package has tests)
        run: pnpm run verify:workspace-coverage

      - name: Verify extension coverage (parity with verify:merge)
        run: pnpm run verify:extension-coverage

      - name: Compile test artifacts
        run: pnpm run test:compile

      - name: Run unit tests
        run: pnpm run test:unit:compiled

      - name: Run package tests
        env:
          GSD_SKIP_NATIVE_PACKAGE_TESTS: ${{ needs.fast-gates.outputs.portability-changed == 'true' && '0' || '1' }}
        run: pnpm run test:packages:compiled

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run e2e suite (against built binary)
        run: |
          chmod +x dist/loader.js
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          pnpm run test:e2e

      - name: Run docker e2e suite
        if: needs.fast-gates.outputs.docker-changed == 'true'
        run: pnpm run test:e2e:docker

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7

  windows-portability:
    name: windows-portability
    timeout-minutes: 25
    needs: [fast-gates, build]
    if: >-
      needs.fast-gates.outputs.heavy-code-changed == 'true' &&
      (needs.fast-gates.outputs.portability-changed == 'true' ||
       needs.fast-gates.outputs.windows-e2e-changed == 'true')
    runs-on: blacksmith-4vcpu-windows-2025

    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Typecheck extensions
        if: needs.fast-gates.outputs.portability-changed == 'true'
        run: pnpm run typecheck:extensions

      - name: Run package tests
        if: needs.fast-gates.outputs.portability-changed == 'true'
        run: pnpm run test:packages

      - name: Run Windows portability tests
        if: needs.fast-gates.outputs.portability-changed == 'true'
        run: >-
          node --import ./src/resources/extensions/gsd/tests/resolve-ts.mjs
          --experimental-strip-types --test
          src/tests/windows-portability.test.ts
          src/resources/extensions/gsd/tests/validate-directory.test.ts
          src/tests/integration/web-mode-windows-hide.test.ts

      - name: Run Windows e2e smoke suite (non-blocking)
        id: windows-smoke-e2e
        if: needs.fast-gates.outputs.windows-e2e-changed == 'true'
        timeout-minutes: 10
        shell: bash
        continue-on-error: true
        run: |
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          pnpm run test:e2e:windows-smoke

      - name: Flag Windows e2e smoke failure
        # continue-on-error keeps this non-blocking, but a silent failure means a
        # broken Windows loader stays green forever. Surface it as an annotation.
        if: steps.windows-smoke-e2e.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning title=Windows e2e smoke failed::The non-blocking Windows e2e smoke suite failed. See the e2e-artifacts-windows artifact."

      - name: Upload Windows e2e artifacts on failure
        if: steps.windows-smoke-e2e.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-windows
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7

  # Validate the declared engines floor (package.json engines.node ">=22.0.0").
  # The main build/test lanes run on Node 24, so without this lane the supported
  # minor (22.x) is never exercised. Cheap: reuse the build artifacts and just run
  # the smoke suite against the built binary on Node 22.
  node22-smoke:
    name: node22-smoke
    timeout-minutes: 15
    needs: [fast-gates, build]
    if: needs.fast-gates.outputs.heavy-code-changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository without GITHUB_TOKEN
        shell: bash
        env:
          FETCH_DEPTH: '1'
        run: |
          set -euo pipefail
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git -c protocol.version=2 fetch --no-tags --prune --depth="$FETCH_DEPTH" origin \
            "+${GITHUB_REF}:refs/checkout-ref"
          git checkout --force --detach "$GITHUB_SHA"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.12.1

      - name: Setup Node.js 22 (engines floor)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: ./.github/actions/restore-ci-build-artifacts

      - name: Run smoke suite on Node 22
        shell: bash
        run: |
          chmod +x dist/loader.js
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          pnpm run test:smoke

  # Single aggregate gate. Make THIS the only required status check in branch
  # protection. Because it always runs, branch protection always has a concrete
  # pass/fail signal — a conditionally-skipped `build`/`windows-portability` job
  # can no longer read as a neutral "required check never reported" state.
  ci-gate:
    name: ci-gate
    if: always()
    needs: [fast-gates, build, windows-portability, node22-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Assert no upstream job failed or was cancelled
        env:
          FAST_GATES: ${{ needs.fast-gates.result }}
          BUILD: ${{ needs.build.result }}
          WINDOWS: ${{ needs.windows-portability.result }}
          NODE22: ${{ needs.node22-smoke.result }}
        shell: bash
        run: |
          set -euo pipefail
          echo "fast-gates=$FAST_GATES build=$BUILD windows-portability=$WINDOWS node22-smoke=$NODE22"
          # 'skipped' is an acceptable result (job legitimately not needed).
          # Only 'failure' / 'cancelled' must block the merge.
          status=0
          for result in "$FAST_GATES" "$BUILD" "$WINDOWS" "$NODE22"; do
            case "$result" in
              success|skipped) ;;
              *) status=1 ;;
            esac
          done
          if [ "$status" -ne 0 ]; then
            echo "::error title=CI gate failed::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed (or were legitimately skipped)."
