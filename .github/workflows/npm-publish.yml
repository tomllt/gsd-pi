# @opengsd/gsd-pi + CI: manual npm publish with approval gates
name: NPM Publish

# Manual npm publish. npm trusted publishing accepts one configured workflow
# filename per package, so dev, next, and latest publishes all live here.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "npm dist-tag to publish"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - next
          - latest
      ref:
        description: "Branch or SHA for prerelease publishes (defaults: dev -> main, next -> next; latest always uses main)"
        required: false
        default: ""
      publish_auth:
        description: "npm auth: token uses NPM_TOKEN; trusted uses OIDC (default)"
        required: false
        default: "trusted"
        type: choice
        options:
          - "trusted"
          - "token"

concurrency:
  group: npm-publish-${{ github.event.inputs.channel }}-${{ github.event.inputs.ref || 'default' }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  prerelease-publish:
    name: Publish @${{ github.event.inputs.channel }}
    if: ${{ github.event.inputs.channel != 'latest' }}
    # npm trusted publishing requires GitHub-hosted runners for OIDC.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: ${{ github.event.inputs.channel }}
    container:
      image: ghcr.io/open-gsd/gsd-ci-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_REPO_NAME: ${{ github.repository }}
    outputs:
      version: ${{ steps.stamp.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Verify npm publish toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('npm publish requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('npm publish requires npm >= 11.5.1'); }"

      - name: Verify NPM_TOKEN for token publish
        if: github.event.inputs.publish_auth == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::publish_auth=token requires the NPM_TOKEN repository secret."
            exit 1
          fi
          npm whoami

      - name: Install web host dependencies
        run: npm --prefix web ci

      - uses: ./.github/actions/cache-nextjs

      - name: Build core
        run: npm run build:core

      - name: Build web host
        run: npm run build:web-host

      - name: Stamp prerelease version and sync platform packages
        id: stamp
        env:
          VERSION_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          npm run pipeline:version-stamp
          npm run sync-platform-versions
          echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          npm run test:smoke

      - name: Verify native platform packages exist
        run: npm run verify:native-platform-packages

      - name: Publish @${{ github.event.inputs.channel }}
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          if npm view "@opengsd/gsd-pi@${VERSION}" version 2>/dev/null; then
            echo "::error::Version ${VERSION} already exists. Trusted publishing only authenticates npm publish, not dist-tag mutation."
            echo "::error::Move the tag manually if intended: npm dist-tag add @opengsd/gsd-pi@${VERSION} ${CHANNEL}"
            exit 1
          fi
          npm publish --tag "${CHANNEL}"
          echo "Verifying @opengsd/gsd-pi@${VERSION} is reachable on npm..."
          for i in 1 2 3 4 5; do
            npm view "@opengsd/gsd-pi@${VERSION}" version 2>/dev/null && echo "Confirmed: @opengsd/gsd-pi@${VERSION} is live." && exit 0
            echo "Attempt $i: not yet visible - waiting 10s..."
            sleep 10
          done
          echo "::error::Publish step succeeded but @opengsd/gsd-pi@${VERSION} is not reachable on npm after 50s. Check trusted publishing and registry propagation."
          exit 1

  prerelease-verify:
    name: Verify @${{ github.event.inputs.channel }} package
    if: ${{ github.event.inputs.channel != 'latest' }}
    needs: prerelease-publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: "npm"

      - name: Install published @opengsd/gsd-pi@${{ github.event.inputs.channel }} globally (with registry propagation retry)
        env:
          PUBLISH_VERSION: ${{ needs.prerelease-publish.outputs.version }}
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          for i in 1 2 3 4 5 6; do
            npm install -g "@opengsd/gsd-pi@${PUBLISH_VERSION}" && exit 0
            echo "Attempt $i failed - waiting 10s for npm registry propagation..."
            sleep 10
          done
          echo "::error::Failed to install @opengsd/gsd-pi@${PUBLISH_VERSION} after 6 attempts."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) if the version exists on npm, deprecate it with 'npm deprecate @opengsd/gsd-pi@${PUBLISH_VERSION} \"broken ${CHANNEL} build; see Actions run\"', (3) cut a fix and re-run NPM Publish."
          exit 1

      - name: Run smoke tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          npm run test:smoke

      - name: Install repo dependencies (for regression harness)
        run: npm ci

      - name: Run live regression tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          npm run test:live-regression

      - name: Warn on verify failure
        if: failure()
        env:
          PUBLISH_VERSION: ${{ needs.prerelease-publish.outputs.version }}
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          echo "::error::Post-publish verification failed for @opengsd/gsd-pi@${PUBLISH_VERSION}."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) if the version exists on npm, deprecate it with 'npm deprecate @opengsd/gsd-pi@${PUBLISH_VERSION} \"broken ${CHANNEL} build; see Actions run\"', (3) cut a fix and re-run NPM Publish."
          exit 1

  prod-release:
    name: Production Release
    if: ${{ github.event.inputs.channel == 'latest' }}
    # npm trusted publishing requires GitHub-hosted runners for OIDC.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: prod
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify trusted publishing toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('Trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('Trusted publishing requires npm >= 11.5.1'); }"

      - uses: ./.github/actions/cache-nextjs

      - name: Run live LLM tests (optional)
        continue-on-error: true
        run: npm run test:live || echo "::warning::Live LLM tests failed - non-blocking, but worth investigating"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSD_LIVE_TESTS: "1"

      - name: Generate changelog and determine version
        id: release
        run: |
          OUTPUT=$(node scripts/generate-changelog.mjs)
          echo "$OUTPUT" | jq .
          echo "version=$(echo "$OUTPUT" | jq -r '.newVersion')" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" | jq -r '.changelogEntry' > /tmp/changelog-entry.md
          echo "$OUTPUT" | jq -r '.releaseNotes' > /tmp/release-notes.md

      - name: Bump version and sync packages
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: node scripts/bump-version.mjs "$RELEASE_VERSION"

      - name: Validate package files after version bump
        run: |
          node -e "require('./package.json')" && \
          node -e "require('./packages/pi-coding-agent/package.json')" && \
          node -e "require('./pkg/package.json')" && \
          npm run verify:version-sync && \
          echo "All package.json files are valid"

      - name: Update CHANGELOG.md
        run: node scripts/update-changelog.mjs /tmp/changelog-entry.md

      - name: Commit and tag release
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json web/package-lock.json CHANGELOG.md native/Cargo.toml native/Cargo.lock native/npm/*/package.json pkg/package.json packages/*/package.json extensions/google-search/package.json
          git commit -m "release: v${RELEASE_VERSION}"
          git pull --rebase origin main
          git tag "v${RELEASE_VERSION}"

      - name: Build release
        run: npm run build

      - name: Run live regression tests (against release build)
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          npm run test:live-regression

      - name: Verify native platform packages for release version
        run: npm run verify:native-platform-packages

      - name: Publish release to npm @latest
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if OUTPUT=$(npm publish 2>&1); then
            echo "$OUTPUT"
          else
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::error::Version ${RELEASE_VERSION} already exists. Trusted publishing only authenticates npm publish, not dist-tag mutation."
              echo "::error::Promote manually if intended: npm dist-tag add @opengsd/gsd-pi@${RELEASE_VERSION} latest"
              exit 1
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Push release commit and tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git push origin main
          git push origin "v${RELEASE_VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Post to Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          NOTES=$(cat /tmp/release-notes.md)
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "**GSD v${RELEASE_VERSION} Released**\n\n${NOTES}\n\n\`npm i @opengsd/gsd-pi@${RELEASE_VERSION}\`" '{content:$c}')"

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release Docker image
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          docker build --target runtime \
            -t ghcr.io/open-gsd/gsd-pi:latest \
            -t "ghcr.io/open-gsd/gsd-pi:${RELEASE_VERSION}" \
            .
          docker push "ghcr.io/open-gsd/gsd-pi:${RELEASE_VERSION}"
          docker push ghcr.io/open-gsd/gsd-pi:latest

      - name: Open back-merge PR main to next if behind
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if ! git ls-remote --exit-code --heads origin next >/dev/null 2>&1; then
            echo "next branch does not exist yet; skipping back-merge"
            exit 0
          fi
          git fetch origin next main
          BEHIND=$(git rev-list --count origin/next..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            BRANCH="backmerge/main-to-next-v${RELEASE_VERSION}"
            git checkout -B "$BRANCH" origin/main
            git push origin "$BRANCH" --force-with-lease
            gh pr create --base next --head "$BRANCH" \
              --title "chore: back-merge main to next (v${RELEASE_VERSION})" \
              --body "Sync release commit and version bump from main into next." || true
          else
            echo "next is up to date with main; no back-merge needed"
          fi
